@if (members().length) {
  <table class="amv-table">
    <thead>
      <tr>
        <th scope="col">Prénom</th>
        <th scope="col">Nom de famille</th>
      </tr>
    </thead>
    @for (member of members(); track member) {
      <tr [class.even]="$even">
        <td>{{ member.firstName }}</td>
        <td>{{ member.lastName }}</td>
      </tr>
    }
  </table>
} @else {
  <div>Aucun membre enregistré</div>
}

<a class="a-button" routerLink="/members/add"><span class="material-symbols-outlined">add</span>Ajouter un membre</a>
